[tox]
envlist =
    py39
    py310
    py311
    py312
    py313
    py314
    docs


[gh-actions]
python =
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312, docs
    3.13: py313
    3.14: py314


[testenv]
deps =
    -r{toxinidir}/requirements.txt

commands =
    python -m pytest


[testenv:docs]
description = invoke sphinx-build to build the HTML docs

deps =
    {[testenv]deps}

commands =
    sphinx-build -d "{toxworkdir}/docs_doctree" doc "{toxworkdir}/docs_out" --color -bhtml {posargs}

[pydocstyle]
ignore = D107, D100, D101, D104, D102
